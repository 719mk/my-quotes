<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            /* Notionのデフォルト背景に馴染む色 */
            background-color: #f1f1f1; 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0 20px;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        .main-text {
            font-size: 1.1rem;
            color: #333;
            line-height: 1.6;
            font-weight: 500;
            margin-bottom: 8px;
            white-space: pre-wrap;
        }
        .sub-text {
            font-size: 0.85rem;
            color: #666;
            font-style: italic;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="display-content" class="main-text">読み込み中...</div>
        <div id="display-description" class="sub-text"></div>
    </div>

    <script>
        const myData = [
            { 
                content: `神学校では、僕は神様を見つけることができなかったと、朝日が昇るのを見ながら、少年は思った。`, 
                description: `『アルケミスト』` 
            },
            { 
                content: `世界は多くのことばを話すものだ、と少年は思った。`, 
                description: `『アルケミスト』` 
            },
            { 
                content: `彼女にとっては、毎日が同じだった。毎日が次の日と同じだということは、太陽が昇るというような、毎日起こっているすばらしいことに、気がつかないからなのだ。`, 
                description: `『アルケミスト』` 
            },
            { 
                content: `まだ若い頃は、すべてがはっきりしていて、すべてが可能だ。夢を見ることも、自分の人生に起こってほしいすべてのことにあこがれることも、恐れない。ところが、時がたつうちに、不思議な力が、自分の運命を実現することは不可能だと、彼らに思い込ませ始めるのだ。`, 
                description: `『アルケミスト』` 
            },
            { 
                content: `お腹が空いていることと、寝起きする場所でくつろげないことは、だめです。子どもも大人も関係なくどんな人にとっても。`, 
                description: `『カフネ』` 
            },
            { 
                content: `つい先ほどまで心がちぎれてしまいそうだったのに、ひと口パフェを食べるごとに、ばらばらになりかけていた自分の輪郭が修復されていく。これは、私を私に戻してくれる、完璧な食べ物だ。`, 
                description: `『カフネ』。` 
            },
            { 
                content: `あとね。おにぎりを作れるようになると、人生の戦闘力が上がるよ。`, 
                description: `『カフネ』。` 
            },
            { 
                content: `この子にとって、何かを作って食べさせてあげることっては、『好きだよ』って伝えることなんだなって。`, 
                description: `『カフネ』。` 
            },
            { 
                content: `おいしいって思うことが、楽しいって思うことが、うれしいって思うことが、生きていくためにどれだけ大事か、あなたこそよくわかってるんじゃないの。`, 
                description: `『カフネ』。` 
            },
            { 
                content: `あなただってなれるわよ。あなたはこれから、願ったら何にだってなれるの。難しいと思ったら私を呼びなさい、必ずあなたをなりたいものにしてみせる。`, 
                description: `『カフネ』。` 
            },
            { 
                content: `胸に白い花が咲くような、あたたかい風が吹き抜けていくような、こんな気持ちを、愛おしいというのだろう。`, 
                description: `『カフネ』。` 
            },
            { 
                content: `大昔はね、月に裏も表もなかったんですよ。月は今より早く自転していましたから、あらゆる面を地球に見せてたんです。とはいえ、見ていた人間はいやしません。ほんとの大昔、たぶん何十億年も前のことですからねえ。`, 
                description: `『月まで三キロ』` 
            },
            { 
                content: `月ってね、だんだん地球から遠ざかってるんですよ。`, 
                description: `『月まで三キロ』` 
            },
            { 
                content: `思い出だけで生きていけたらいいのに。たった一度の言葉を永遠のダイヤモンドに変えて、それを抱きしめて生きていける人だっているという。私もそうでありたいと思う。`, 
                description: `『５２ヘルツのクジラたち』` 
            },
            { 
                content: `わたしは、彼が新しい人生だというこの始まりの記憶だけで生きていける気がする。他にはもう、何もいらない。`, 
                description: `『５２ヘルツのクジラたち』` 
            },
            { 
                content: `わたしは、彼が新しい人生だというこの始まりの記憶だけで生きていける気がする。他にはもう、何もいらない。`, 
                description: `『５２ヘルツのクジラたち』` 
            }
        ];

        const picked = myData[Math.floor(Math.random() * myData.length)];
        
        if (picked) {
            document.getElementById('display-content').innerText = picked.content;
            document.getElementById('display-description').innerText = picked.description;
        }
    </script>
</body>
</html>
